name: PR Checks

on:
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Quick linting checks
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci

      - name: Run backend linting
        run: |
          cd backend
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check src/ tests/
          mypy src/ --ignore-missing-imports

      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint
          npm run type-check

  # Fast unit tests only
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          cd backend
          pytest tests/ \
            --ignore=tests/integration/ \
            --ignore=tests/e2e/ \
            -v \
            --tb=short \
            -x

  # PR comment with test summary
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [lint, quick-tests]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = '${{ needs.lint.result }}';
            const testStatus = '${{ needs.quick-tests.result }}';

            const statusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              return '⏭️';
            };

            const body = `## PR Checks Summary

            | Check | Status |
            |-------|--------|
            | Linting | ${statusEmoji(lintStatus)} ${lintStatus} |
            | Quick Tests | ${statusEmoji(testStatus)} ${testStatus} |

            ${lintStatus === 'success' && testStatus === 'success' 
              ? '✅ All checks passed! Ready for review.' 
              : '❌ Some checks failed. Please review the logs above.'}

            **Note**: Full test suite (including integration tests and coverage) will run on merge to main.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
